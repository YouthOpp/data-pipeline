name: Merge & Sync Data

# This workflow merges all classified data, builds the final deduplicated
# dataset, and pushes it to the external data repository.
#
# Individual source pipelines run on their own staggered schedules
# (see .github/workflows/source-*.yml).

on:
  workflow_dispatch:
  schedule:
    # Run once daily at 03:00 UTC to merge all source data
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  merge-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Re-classify historical normalized data
        run: node scripts/classify.js

      - name: Deduplicate and build latest dataset
        run: node scripts/dedupe_merge.js

      - name: Push data to external data repo
        if: env.DATA_REPO_URL != ''
        env:
          DATA_REPO_URL: ${{ secrets.DATA_REPO_URL }}
          DATA_BRANCH: main
        run: bash scripts/push_data.sh

      - name: Commit and push changes (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/classified/ data/latest/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update merged opportunities dataset"
            git push
          fi
